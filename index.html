<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Festival Date Privé - 07/03</title>
    <style>
        html { -webkit-overflow-scrolling: touch; overscroll-behavior: none; height: 100%; }
        body { 
            margin: 0; padding: 30px 20px; min-height: 100vh; font-family: 'Poppins', sans-serif; line-height: 1.7;
            background: linear-gradient(135deg, #ff6b6b 0%, #f7931e 30%, #4ecdc4 60%, #45b7d1 100%);
            background-size: 400% 400%; animation: gradientShift 12s ease infinite; color: #333; overflow-x: hidden;
        }
        @keyframes gradientShift { 0%,100%{background-position:0%50%}50%{background-position:100%50%} }
        
        .poster {
            max-width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(25px);
            border: 3px solid rgba(255,255,255,0.9); border-radius: 35px; padding: 60px 40px;
            margin-bottom: 80px; box-shadow: 0 30px 90px rgba(0,0,0,0.2); text-align: center;
        }
        .poster::before {
            content: ''; position: absolute; inset: -8px; left: 50%; transform: translateX(-50%);
            width: calc(100% + 16px); height: calc(100% + 16px); background: linear-gradient(45deg, rgba(255,255,255,0.7), rgba(255,215,0,0.5));
            border-radius: 43px; z-index: -1; animation: glow 2.5s infinite alternate; opacity: 0.8;
        }
        @keyframes glow { from{opacity:0.6} to{opacity:0.9} }
        
        /* TEXTE SOLIDE - PAS DEGRADES BUGGUES MOBILE */
        h1 { 
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.8em, 15vw, 6em); margin: 0 0 30px;
            text-transform: uppercase; letter-spacing: 8px; line-height: 1.1; color: #ff4757;
            font-weight: 900; text-shadow: 3px 3px 8px rgba(0,0,0,0.3), 0 0 20px rgba(255,71,87,0.5);
        }
        .date { 
            font-size: clamp(1.8em, 9vw, 3.2em); margin: 0 0 45px; padding: 25px 40px; line-height: 1.2;
            background: linear-gradient(135deg, rgba(255,71,87,0.9), rgba(255,165,2,0.9)); color: white; font-weight: bold;
            border-radius: 30px; display: inline-block; box-shadow: 0 12px 35px rgba(255,71,87,0.5);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        }
        
        .section { margin: 50px 0; padding: 45px 40px; background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            border-radius: 30px; border: 3px solid rgba(255,255,255,1); box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transition: all 0.4s; touch-action: manipulation;
        }
        .section:active { transform: translateY(4px); box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
        
        .icon { 
            width: clamp(100px, 28vw, 140px); height: clamp(100px, 28vw, 140px); margin: 30px auto; border-radius: 25px;
            border: 5px solid rgba(255,255,255,1); font-size: clamp(3em, 12vw, 5em); line-height: 1;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 15px 45px rgba(0,0,0,0.25);
            background: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,255,255,0.9)); color: #555;
        }
        .ceramique { box-shadow: 0 15px 45px rgba(210,105,30,0.5); }
        .jeux { box-shadow: 0 15px 45px rgba(30,144,255,0.5); }
        
        /* TITRES SOLIDES ROSE/BLEU */
        .section h3 { 
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8em, 9vw, 2.8em); margin: 0 0 25px; line-height: 1.2;
            color: #ff4757; font-weight: 900; text-shadow: 2px 2px 6px rgba(0,0,0,0.2);
        }
        .section p { margin: 0 0 25px; font-size: clamp(1.3em, 5.5vw, 1.6em); color: #555; font-weight: 500; }
        
        .menu-list { display: flex; flex-direction: column; gap: 30px; margin-top: 35px; padding: 35px;
            background: rgba(255,255,255,0.85); border-radius: 25px; backdrop-filter: blur(15px);
            border: 2px solid rgba(255,255,255,1);
        }
        .menu-item {
            padding: 35px 30px; /* + GRAND PADDING */
            border-radius: 22px; font-weight: bold; font-size: clamp(1.4em, 6.5vw, 1.8em); /* + GROS */
            text-align: center; line-height: 1.35; min-height: 100px; /* + HAUT */
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: linear-gradient(135deg, rgba(255,71,87,0.9), rgba(78,205,196,0.9));
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.4); 
            box-shadow: 0 15px 40px rgba(255,71,87,0.45); border: 3px solid rgba(255,255,255,0.9);
        }
        .menu-item strong { display: block; font-size: 1.1em; margin-bottom: 8px; }
        
        .invite {
            margin: 60px 0 120px; padding: 55px 50px; background: linear-gradient(135deg, rgba(255,255,255,1), rgba(255,215,0,0.4));
            backdrop-filter: blur(25px); border: 4px solid rgba(255,215,0,1); border-radius: 35px;
            font-size: clamp(1.7em, 9vw, 2.6em); font-weight: bold; line-height: 1.4; color: #333;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.1); animation: pulse 2s infinite;
            box-shadow: 0 30px 90px rgba(255,215,0,0.35);
        }
        @keyframes pulse {
