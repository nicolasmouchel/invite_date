<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festival Date Privé - Samedi 07/03</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;700&display=swap');
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .poster {
            max-width: 800px;
            width: 90%;
            background: rgba(0,0,0,0.8);
            border: 5px solid #fff;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }
        .poster::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #fecfef, #ff9a9e);
            border-radius: 30px;
            z-index: -1;
            animation: glow 2s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { opacity: 0.8; }
            to { opacity: 1; }
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 4em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 3px 3px 0 #000;
        }
        .date {
            font-size: 2em;
            margin: 10px 0 30px;
            color: #ffd700;
        }
        .program {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .event {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .event img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid #fff;
        }
        .event h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8em;
            margin: 0;
            color: #ffd700;
        }
        .event p {
            margin: 5px 0 0;
            font-size: 1.1em;
        }
