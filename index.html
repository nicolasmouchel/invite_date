<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Festival Date Privé - 07/03</title>
    <style>
        /* FIX SCROLL MOBILE */
        html { -webkit-overflow-scrolling: touch; overscroll-behavior: none; height: 100%; }
        body { 
            margin: 0; padding: 25px 15px; min-height: 100vh; 
            font-family: 'Poppins', sans-serif; line-height: 1.6;
            background: linear-gradient(135deg, #ff6b6b 0%, #f7931e 25%, #4ecdc4 50%, #45b7d1 75%, #f9ca24 100%);
            background-size: 400% 400%; animation: gradientShift 12s ease infinite;
            color: #333; /* TEXTE FONCÉ pour fond blanc */
            overflow-x: hidden;
        }
        @keyframes gradientShift { 0%,100%{background-position:0%50%}50%{background-position:100%50%} }
        
        .poster {
            max-width: 100%; 
            background: rgba(255,255,255,0.92); /* FOND BLANC TRANSPARENT */
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.8); border-radius: 30px;
            padding: 50px 35px; margin-bottom: 60px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.8);
            text-align: center; position: relative;
        }
        .poster::before {
            content: ''; position: absolute; inset: -5px; left: 50%; transform: translateX(-50%);
            width: calc(100% + 10px); height: calc(100% + 10px); 
            background: linear-gradient(45deg, rgba(255,255,255,0.6), rgba(255,215,0,0.4));
            border-radius: 35px; z-index: -1; animation: glow 2.5s infinite alternate;
        }
        @keyframes glow { from{opacity:0.7} to{opacity:1} }
        
        h1 { 
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.4em, 13vw, 5em);
            margin: 0 0 25px; text-transform: uppercase; letter-spacing: 6px;
            background: linear-gradient(45deg, #ff6b6b, #f7931e, #4ecdc4, #ffd700);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .date { 
            font-size: clamp(1.6em, 8vw, 2.8em); margin: 0 0 40px; padding: 20px 30px;
            background: linear-gradient(135deg, rgba(255,107,107,0.8), rgba(255,193,7,0.8));
            color: white; font-weight: bold; border-radius: 25px; display: inline-block;
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }
        
        .section {
            margin: 40px 0; padding: 35px 30px; 
            background: rgba(255,255,255,0.85); /* BLANC TRANSPARENT */
            backdrop-filter: blur(15px); border-radius: 25px; border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,1);
            transition: all 0.3s ease; touch-action: manipulation;
        }
        .section:active { transform: translateY(3px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .icon { 
            width: clamp(90px, 24vw, 120px); height: clamp(90px, 24vw, 120px); margin: 25px auto;
            border-radius: 20px; border: 4px solid rgba(255,255,255,0.9); font-size: clamp(2.5em, 10vw, 4.5em);
            display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(255,255,255,0.7));
            color: #333;
        }
        .ceramique { box-shadow: 0 10px 30px rgba(210,105,30,0.4); }
        .jeux { box-shadow: 0 10px 30px rgba(30,144,255,0.4); }
        
        .section h3 { 
            font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.5em, 7vw, 2.3em);
            margin: 0 0 20px; 
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        .section p { margin: 0 0 18px; font-size: clamp(1.15em, 4.5vw, 1.4em); color: #444; }
        
        .menu-grid {
            display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 30px; padding: 25px;
            background: rgba(255,255,255,0.7); border-radius: 20px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
        }
        @media (min-width: 500px) { .menu-grid { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); } }
        .menu-item {
            background: linear-gradient(135deg, rgba(255,107,107,0.7), rgba(78,205,196,0.7));
            padding: 22px 20px; border-radius: 18px; font-weight: bold; font-size: clamp(1.05em, 4vw, 1.25em);
            color: white; text-align: center; text-shadow: 1px 1px 1px rgba(0,0,0,0.3);
            box-shadow: 0 8px 25px rgba(255,107,107,0.4);
        }
        
        .invite {
            margin: 50px 0 100px; padding: 40px 35px; 
            background: linear-gradient(135deg, rgba(255,255,255,0.95), rgba(255,215,0,0.3));
            backdrop-filter: blur(20px); border: 3px solid rgba(255,215,0,0.8); border-radius: 30px;
            font-size: clamp(1.4em, 6vw, 2em); font-weight: bold;
            animation: pulse 2s infinite; box-shadow: 0 20px 60px rgba(255,215,0,0.3);
            color: #333; text-shadow: none;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)}50%{transform:scale(1.015)} }
        .emoji-row { font-size: clamp(2em, 8vw, 3em); margin: 20px 0; }
        
        .spacer { height: 120px; }
    </style>
</head>
<body>
    <div class="poster">
        <h1>Festival Date Privé</h1>
        <div class="date">📅 Samedi 07/03</div>
        
        <div class="section">
            <div class="icon ceramique">🎨🖌️</div>
            <h3>10h : Atelier Peinture Céramique</h3>
            <p class="emoji-row">🥐☕🍊 Brunch gourmand inclus !</p>
        </div>
        
        <div class="section">
            <div class="icon jeux">🎲❤️</div>
            <h3>🌙 Soirée Jeux de Société</h3>
            <p>Ambiance cosy & détendue</p>
            <div class="menu-grid">
                <div class="menu-item">🍲<br>Entrée Chorba</div>
                <div class="menu-item">🍆 Steak & Aubergine<br>Rôti + Sauce Menthe</div>
                <div class="menu-item">🍓 Crumble<br>Fruits Rouges</div>
            </div>
        </div>
        
        <div class="invite">
            Prête pour notre Date ? 💕<br>
            <span style="font-size:1.1em; display:block; margin-top:12px; color:#666;">
                👆 Confirme par message !
            </span>
        </div>
    </div>
    <div class="spacer"></div>
</body>
</html>
